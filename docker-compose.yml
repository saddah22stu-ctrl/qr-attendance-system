version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: qr_attendance
      MYSQL_USER: qr_user
      MYSQL_PASSWORD: qr_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: qr_attendance
      DB_USER: qr_user
      DB_PASSWORD: qr_password
      DB_DIALECT: mysql
      JWT_SECRET: your_super_secret_jwt_key
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  mysql_data: