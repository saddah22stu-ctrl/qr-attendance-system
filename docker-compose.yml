version: '3.8'

services:
  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongo:27017/qr-attendance?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

volumes:
  mongo_data: